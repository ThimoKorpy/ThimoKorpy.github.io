<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texel Drink Trip 🍺</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="landing" class="page active">
    <h1>🍺 TEXEL DRINK PORTAL 🍺</h1>
    <button onclick="showPage('timePage')">⏰ Check de Tijd</button>
    <button onclick="showPage('wheelPage')">🎡 Draai het Rad</button>
    <button onclick="showPage('scorePage')">🏆 Scorebord</button>
</div>

<div id="timePage" class="page">
    <h2>⏰ Hoe laat is het?</h2>
    <p id="timeResult"></p>
    <button onclick="checkTime()">Check Nu</button>
    <button onclick="showPage('landing')">⬅ Terug</button>
</div>

<div id="wheelPage" class="page">
    <h2>🎡 HET GROTE TEXEL RAD</h2>
    <input type="text" id="nameInput" placeholder="Vul je naam in">
    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>
    <h3 id="liveResult">Klaar om te draaien...</h3>
    
    <button onclick="spinWheel()">DRAAI!</button>
    <h3 id="wheelResult"></h3>
    <button onclick="showPage('landing')">⬅ Terug</button>
</div>

<div id="scorePage" class="page">
    <h2>🏆 Scorebord</h2>
    <div id="scoreBoard"></div>
    <button onclick="resetScores()">Reset Scores</button>
    <button onclick="showPage('landing')">⬅ Terug</button>
</div>

<canvas id="confetti"></canvas>

<script src="script.js"></script>
</body>
</html>
